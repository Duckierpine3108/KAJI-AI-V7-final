plugins {
    id "com.android.application"
}

android {
    namespace "com.prospera.kajiapp"
    compileSdk 33

    defaultConfig {
        applicationId "com.prospera.kajiapp"
        minSdk 21
        targetSdk 33
        versionCode 7
        versionName "7.0.0"
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_11
        targetCompatibility JavaVersion.VERSION_11
    }
}

dependencies {
    implementation "androidx.appcompat:appcompat:1.6.1"
}
